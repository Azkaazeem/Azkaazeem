name: Generate Pink Contribution Snake

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: Azkaazeem
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff5ca8&color_dots=#ffe4f1,#ffc2df,#ff8cc8,#ff5ca8,#e61b83
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff5ca8&color_dots=#161b22,#ffc2df,#ff8cc8,#ff5ca8,#e61b83
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
